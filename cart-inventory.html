<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="top-social-bar">
      <a class="bar-text" href="#about-contact">About | Contact</a>
    </div>

    <header class="header1">
      <div class="logo-area">
        <a class="logo" href="index">
          <img src="images/logo.png" alt="TZ computer Logo" />
        </a>
      </div>

      <div class="right-section">
        <span class="whish-list"
          ><img src="images/heart.png" alt="Wishlist"
        /></span>
        <a
          href="#login-section"
          class="user"
          data-bs-toggle="modal"
          data-bs-target="#login-section"
          style="cursor: pointer"
        >
          <img src="images/user.png" alt="User" />
        </a>
      </div>
    </header>

    <div class="modal fade" id="login-section" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Login</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <label for="username">Username:</label>
            <input type="text" class="form-control" id="username" />
            <label for="password">Password:</label>
            <input type="password" class="form-control" id="password" />
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button type="button" class="btn btn-primary" id="login-button">
              Login
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="welcome-popup" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Welcome</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p id="welcome-message">
              Welcome! You have successfully logged in.
            </p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
            >
              OK
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="checkout-modal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Confirm Purchase</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p>Are you sure you want to buy these items?</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-primary" id="confirm-checkout">
              Confirm
            </button>
          </div>
        </div>
      </div>
    </div>

    <main class="cart-page">
      <h1>Your Cart</h1>
      <p id="cart-empty" class="cart-empty">Your cart is empty.</p>
      <p id="checkout-status" class="checkout-status"></p>
      <div id="cart-items"></div>
      <div class="cart-summary">
        <span class="total">
          <p>Total: $<span id="cart-total">0.00</span></p>
        </span>
        <button id="checkout-button" class="buy">Buy Now</button>
      </div>
    </main>

    <script src="js/script.js"></script>

    <footer id="about-contact" class="footer">
      <p class="about">we are a school project</p>
      <p class="contact">Contact us at: info@tzcomputer.com</p>
      <p class="contact">0123456789</p>
      <p class="footer-text">© 2026 TZ computer. All rights reserved.</p>
    </footer>
  </body>
</html>
